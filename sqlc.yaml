version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/infrastructure/database/postgres/queries/"
    schema: "./internal/infrastructure/database/postgres/migrations/"
    gen:
      go:
        package: "generated"
        out: "./internal/infrastructure/database/postgres/generated"
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_sql_as_comment: true
        initialisms: ["id", "guid", "json", "api", "http", "totp"]
        json_tags_case_style: "snake"
        omit_unused_structs: true
        overrides:
          # UUID
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

              # Time
          - db_type: "timestamp"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamp"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "timestamptz"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true

              # JSONB
          - db_type: "jsonb"
            nullable: false
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true

              # Enums
          - db_type: "question_type_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/enum"
              type: "QuestionTypeEnum"
          - db_type: "question_type_enum"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/enum"
              type: "QuestionTypeEnum"
              pointer: true

          - db_type: "scoring_method_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/enum"
              type: "ScoringMethodEnum"
          - db_type: "scoring_method_enum"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/enum"
              type: "ScoringMethodEnum"
              pointer: true

          - db_type: "completion_condition_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/enum"
