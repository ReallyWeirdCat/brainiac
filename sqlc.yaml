version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/infrastructure/database/postgres/queries/"
    schema: "./internal/infrastructure/database/postgres/migrations/"
    gen:
      go:
        package: "generated"
        out: "./internal/infrastructure/database/postgres/generated"
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_sql_as_comment: true
        initialisms: ["id", "guid", "json", "api", "http", "totp", "ipv4", "ipv6"]
        json_tags_case_style: "snake"
        omit_unused_structs: true
        overrides:
          # UUID
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/valueobject"
              type: "GUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/valueobject"
              type: "GUID"
              pointer: true

          # Time
          - db_type: "timestamp"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamp"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "timestamptz"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true

          # JSONB
          - db_type: "jsonb"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/valueobject"
              type: "Metadata"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/valueobject"
              type: "Metadata"
              pointer: true

          # Columns
          - column: "app_user.username"
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/valueobject"
              type: "Username"
              pointer: false

          - column: "app_user_credential.email"
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/pkg/domain/valueobject"
              type: "Email"
              pointer: true

          - column: "app_user_profile.name"
