version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "database"
        out: "."
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_sql_as_comment: true
        initialisms: ["id", "json", "api", "http", "totp"]
        json_tags_case_style: "snake"
        omit_unused_structs: true
        overrides:
          # UUID
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

          # Time
          - db_type: "timestamp"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamp"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "timestamptz"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true

          # JSONB
          - db_type: "jsonb"
            nullable: false
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true

          # Columns
          - column: "app_user.username"
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "Username"
          - column: "app_user_credential.email"
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "Email"

          # Enums
          - db_type: "question_type_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "QuestionTypeEnum"
          - db_type: "question_type_enum"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "QuestionTypeEnum"
              pointer: true
          
          - db_type: "scoring_method_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "ScoringMethodEnum"
          - db_type: "scoring_method_enum"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "ScoringMethodEnum"
              pointer: true
          
          - db_type: "completion_condition_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "CompletionConditionEnum"
          - db_type: "completion_condition_enum"
            nullable: true
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "CompletionConditionEnum"
              pointer: true
          
          - db_type: "subject_status_enum"
            nullable: false
            go_type:
              import: "github.com/ReallyWeirdCat/brainiac/internal/domain/shared"
              type: "SubjectStatusEnum"
          - db_type: "subject_status_enum"
